name: Fix Guardian – Next.js Conversion Engine # v2.1

# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: Converts Lovable (Vite/React Router) syntax to Next.js 15 App Router
# after every push to main. This is the single source of truth for all
# Lovable → Next.js compatibility fixes.
#
# WHAT IT FIXES:
#   1. react-router-dom → next/link + next/navigation
#   2. <Link to= → <Link href=
#   3. useNavigate → useRouter
#   4. useLocation → usePathname
#   5. "use client" directives — smart detection via hook/event patterns
#   6. export metadata + "use client" conflict in page.tsx files
#   7. window.pathname → window.location.pathname
#   8. Restores protected files: SEO.tsx, calendar.tsx, AnimatedSection.tsx
#   9. globals.css overflow-x hidden
#  10. blogPosts getSrc() helper
#  11. StaticImageData .src unwrap
#  12. CMS editor null guards
#  13. AboutPage image extension
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fix-guardian
  cancel-in-progress: false

jobs:
  convert:
    name: Convert Lovable → Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Skip if already a fix commit
        id: check_skip
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $LAST_MSG"
          if echo "$LAST_MSG" | grep -qE "^fix\(guardian\)"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Fix commit — skipping to prevent loop."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git config user.name "Fix Guardian"
          git config user.email "fixes@centience.ai"

      - name: Set up Python
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Restore protected files Lovable must never overwrite ───────────────
      - name: Restore SEO.tsx (Next.js no-op stub)
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          cat > components/SEO.tsx << 'SEOEOF'
"use client";
import React from "react";

interface SEOProps {
  title?: string;
  description?: string;
  canonical?: string;
  ogImage?: string;
  ogType?: string;
  keywords?: string[];
  structuredData?: object;
  breadcrumbs?: Array<{ name: string; url: string }>;
  noindex?: boolean;
  [_key: string]: unknown;
}

/**
 * SEO component — no-op stub for Next.js.
 * Metadata is handled via generateMetadata() in app/layout.tsx and page files.
 */
const SEO: React.FC<SEOProps> = () => null;
export default SEO;
SEOEOF
          echo "Restored SEO.tsx"

      - name: Restore calendar.tsx (react-day-picker v9)
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          cat > components/ui/calendar.tsx << 'CALEOF'
"use client"

import * as React from "react"
import { ChevronLeft, ChevronRight } from "lucide-react"
import { DayPicker } from "react-day-picker"
import { cn } from "@/lib/utils"
import { buttonVariants } from "@/components/ui/button"

export type CalendarProps = React.ComponentProps<typeof DayPicker>

function Calendar({
  className,
  classNames,
  showOutsideDays = true,
  ...props
}: CalendarProps) {
  return (
    <DayPicker
      showOutsideDays={showOutsideDays}
      className={cn("p-3", className)}
      classNames={{
        months: "flex flex-col sm:flex-row space-y-4 sm:space-x-4 sm:space-y-0",
        month: "space-y-4",
        caption: "flex justify-center pt-1 relative items-center",
        caption_label: "text-sm font-medium",
        nav: "space-x-1 flex items-center",
        nav_button: cn(buttonVariants({ variant: "outline" }), "h-7 w-7 bg-transparent p-0 opacity-50 hover:opacity-100"),
        nav_button_previous: "absolute left-1",
        nav_button_next: "absolute right-1",
        table: "w-full border-collapse space-y-1",
        head_row: "flex",
        head_cell: "text-muted-foreground rounded-md w-9 font-normal text-[0.8rem]",
        row: "flex w-full mt-2",
        cell: "h-9 w-9 text-center text-sm p-0 relative focus-within:relative focus-within:z-20",
        day: cn(buttonVariants({ variant: "ghost" }), "h-9 w-9 p-0 font-normal aria-selected:opacity-100"),
        day_range_end: "day-range-end",
        day_selected: "bg-primary text-primary-foreground hover:bg-primary hover:text-primary-foreground focus:bg-primary focus:text-primary-foreground",
        day_today: "bg-accent text-accent-foreground",
        day_outside: "day-outside text-muted-foreground opacity-50",
        day_disabled: "text-muted-foreground opacity-50",
        day_hidden: "invisible",
        ...classNames,
      }}
      components={{
        Chevron: ({ orientation }) =>
          orientation === "left"
            ? <ChevronLeft className="h-4 w-4" />
            : <ChevronRight className="h-4 w-4" />,
      }}
      {...props}
    />
  )
}
Calendar.displayName = "Calendar"
export { Calendar }
CALEOF
          echo "Restored calendar.tsx"

      - name: Restore AnimatedSection.tsx
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          cat > components/AnimatedSection.tsx << 'ANIMEOF'
"use client";
import { motion, useInView } from "framer-motion";
import { useRef, ReactNode, useEffect, useState } from "react";

interface AnimatedSectionProps {
  children: ReactNode;
  className?: string;
  delay?: number;
  direction?: "up" | "down" | "left" | "right" | "scale";
}

const AnimatedSection = ({
  children,
  className = "",
  delay = 0,
  direction = "up",
}: AnimatedSectionProps) => {
  const ref = useRef(null);
  const [isMobile, setIsMobile] = useState(false);

  useEffect(() => {
    const checkMobile = () => setIsMobile(window.innerWidth < 768);
    checkMobile();
    window.addEventListener("resize", checkMobile);
    return () => window.removeEventListener("resize", checkMobile);
  }, []);

  const isInView = useInView(ref, { once: true, margin: "0px" });
  const effectiveDirection =
    isMobile && (direction === "left" || direction === "right") ? "up" : direction;

  const variants = {
    up:    { hidden: { opacity: 0, y: 40 },      visible: { opacity: 1, y: 0 } },
    down:  { hidden: { opacity: 0, y: -40 },     visible: { opacity: 1, y: 0 } },
    left:  { hidden: { opacity: 0, x: -60 },     visible: { opacity: 1, x: 0 } },
    right: { hidden: { opacity: 0, x: 60 },      visible: { opacity: 1, x: 0 } },
    scale: { hidden: { opacity: 0, scale: 0.8 }, visible: { opacity: 1, scale: 1 } },
  };

  return (
    <motion.div
      ref={ref}
      className={className}
      initial="hidden"
      animate={isInView ? "visible" : "hidden"}
      variants={variants[effectiveDirection]}
      transition={{ duration: 0.6, delay, ease: [0.25, 0.46, 0.45, 0.94] }}
    >
      {children}
    </motion.div>
  );
};

export default AnimatedSection;
ANIMEOF
          echo "Restored AnimatedSection.tsx"

      # ── Main conversion Python script ─────────────────────────────────────
      - name: Run Lovable → Next.js conversion
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          python3 << 'PYEOF'
import os
import re

BASE = os.getcwd()

def read(path):
    with open(path, "r", encoding="utf-8", errors="ignore") as f:
        return f.read()

def write(path, content):
    with open(path, "w", encoding="utf-8") as f:
        f.write(content)
    print(f"  fixed: {path.replace(BASE+'/', '')}")

def has_use_client(content):
    first_non_empty = next((l for l in content.split("\n") if l.strip()), "")
    return "use client" in first_non_empty

def needs_use_client(content):
    patterns = [
        "useState", "useEffect", "useRef", "useCallback", "useMemo",
        "useReducer", "useContext", "useRouter", "usePathname",
        "useSearchParams", "framer-motion", "motion.",
        "onClick", "onChange", "onSubmit", "onKeyDown", "onMouseEnter",
        "addEventListener", "window.", "document.",
    ]
    return any(p in content for p in patterns)

def fix_router_dom(content):
    original = content

    # Link import
    content = re.sub(
        r'import\s*\{\s*Link\s*\}\s*from\s*["\']react-router-dom["\'];?\n?',
        'import Link from "next/link";\n',
        content
    )
    # useNavigate only
    content = re.sub(
        r'import\s*\{\s*useNavigate\s*\}\s*from\s*["\']react-router-dom["\'];?\n?',
        'import { useRouter } from "next/navigation";\n',
        content
    )
    # useLocation only
    content = re.sub(
        r'import\s*\{\s*useLocation\s*\}\s*from\s*["\']react-router-dom["\'];?\n?',
        'import { usePathname } from "next/navigation";\n',
        content
    )
    # useParams only
    content = re.sub(
        r'import\s*\{\s*useParams\s*\}\s*from\s*["\']react-router-dom["\'];?\n?',
        'import { useParams } from "next/navigation";\n',
        content
    )
    # Catch-all for remaining react-router-dom imports
    content = re.sub(
        r'import\s*\{[^}]+\}\s*from\s*["\']react-router-dom["\'];?\n?',
        'import { useRouter, usePathname } from "next/navigation";\n',
        content
    )

    # Usage
    content = content.replace("const navigate = useNavigate();", "const router = useRouter();")
    content = content.replace("const navigate = useNavigate()", "const router = useRouter()")
    content = content.replace("const location = useLocation();", "const pathname = usePathname();")
    content = content.replace("const location = useLocation()", "const pathname = usePathname()")
    content = content.replace("location.pathname", "pathname")
    content = re.sub(r'\bnavigate\(', 'router.push(', content)
    content = re.sub(
        r'router\.push\(([^,)]+),\s*\{\s*replace:\s*true\s*\}\)',
        r'router.replace(\1)',
        content
    )
    content = re.sub(r'<Link\s+to=', '<Link href=', content)
    content = re.sub(r'<Link\n(\s+)to=', r'<Link\n\1href=', content)
    content = content.replace("}, [navigate]);", "}, [router]);")
    content = content.replace("window.pathname", "window.location.pathname")

    return content

# ── 1. Fix react-router-dom ──────────────────────────────────────────────────
print("\n[1] Fixing react-router-dom...")
for d in ["components", "page-components"]:
    fp = os.path.join(BASE, d)
    if not os.path.exists(fp): continue
    for root, _, files in os.walk(fp):
        for fname in files:
            if not fname.endswith((".tsx", ".ts")): continue
            fpath = os.path.join(root, fname)
            content = read(fpath)
            if "react-router-dom" in content:
                fixed = fix_router_dom(content)
                if fixed != content:
                    write(fpath, fixed)

# ── 2. Add "use client" where needed ────────────────────────────────────────
print("\n[2] Adding 'use client' directives...")
for d in ["components", "page-components"]:
    fp = os.path.join(BASE, d)
    if not os.path.exists(fp): continue
    for root, _, files in os.walk(fp):
        for fname in files:
            if not fname.endswith(".tsx"): continue
            fpath = os.path.join(root, fname)
            content = read(fpath)
            if not has_use_client(content) and needs_use_client(content):
                write(fpath, '"use client";\n' + content)

# ── 3. Fix metadata + "use client" conflict in page.tsx ─────────────────────
print("\n[3] Fixing metadata conflicts...")
app_dir = os.path.join(BASE, "app")
if os.path.exists(app_dir):
    for root, _, files in os.walk(app_dir):
        for fname in files:
            if fname != "page.tsx": continue
            fpath = os.path.join(root, fname)
            content = read(fpath)
            if has_use_client(content) and "export const metadata" in content:
                fixed = content.replace('"use client";\n', '').replace("'use client';\n", '')
                write(fpath, fixed)

# ── 4. globals.css overflow-x hidden ────────────────────────────────────────
print("\n[4] Checking globals.css...")
gp = os.path.join(BASE, "app/globals.css")
if os.path.exists(gp):
    content = read(gp)
    if "overflow-x: hidden" not in content:
        # Insert after body { line
        content = re.sub(r'(body\s*\{)', r'\1\n  overflow-x: hidden;', content)
        write(gp, content)

# ── 5. blogPosts getSrc() helper ─────────────────────────────────────────────
print("\n[5] Checking blogPosts getSrc...")
bpts = os.path.join(BASE, "data/blogPosts.ts")
if os.path.exists(bpts):
    content = read(bpts)
    if "export function getSrc" not in content and "export const getSrc" not in content:
        content += '\nexport function getSrc(image: any): string {\n  if (typeof image === "string") return image;\n  return image.src;\n}\n'
        write(bpts, content)

# ── 6. StaticImageData .src unwrap ───────────────────────────────────────────
print("\n[6] StaticImageData fix...")
for rel in [
    "components/BlogAuthorCard.tsx",
    "page-components/AboutPage.tsx",
]:
    fp = os.path.join(BASE, rel)
    if not os.path.exists(fp): continue
    content = read(fp)
    original = content
    content = re.sub(
        r'<img\s+src={([a-zA-Z_][a-zA-Z0-9_]*)}',
        lambda m: f'<img src={{typeof {m.group(1)} === "string" ? {m.group(1)} : ({m.group(1)} as any).src}}',
        content
    )
    if content != original: write(fp, content)

# ── 7. CMS editor null guards ────────────────────────────────────────────────
print("\n[7] CMS null guards...")
for rel, id_var in [
    ("components/admin/cms/CMSBlogEditor.tsx", "postId"),
    ("components/admin/cms/CMSIndustryEditor.tsx", "industryId"),
    ("components/admin/cms/CMSServiceEditor.tsx", "serviceId"),
]:
    fp = os.path.join(BASE, rel)
    if not os.path.exists(fp): continue
    content = read(fp)
    original = content
    guard = f"if (!{id_var}) return;\n    "
    if guard not in content and "setIsLoading(true);" in content:
        content = content.replace("setIsLoading(true);", f"{guard}setIsLoading(true);", 1)
        if content != original: write(fp, content)

# ── 8. AboutPage image extension ─────────────────────────────────────────────
ap = os.path.join(BASE, "page-components/AboutPage.tsx")
if os.path.exists(ap):
    content = read(ap)
    if "orville-matias-about.png" in content:
        write(ap, content.replace(
            'import orvillePhoto from "@/assets/orville-matias-about.png"',
            'import orvillePhoto from "@/assets/orville-matias-about.jpeg"'
        ))

print("\n=== Conversion complete ===")
PYEOF

      # ── Commit ───────────────────────────────────────────────────────────
      - name: Commit and push changes
        if: steps.check_skip.outputs.skip != 'true'
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — all fixes already in place."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            N=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "fix(guardian): auto-restore Next.js compatibility fixes [${N} files]"
            git push
            echo "Pushed fixes for ${N} files."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── If no file changes, trigger Vercel deploy hook directly ──────────
      - name: Trigger Vercel deploy hook (if no file changes)
        if: steps.check_skip.outputs.skip != 'true' && steps.commit.outputs.changed == 'false'
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_JOtoF40htnddIgFupyOkiF60DeSc/PyTjsrRsTf")
          echo "Deploy hook: HTTP $HTTP"
