name: Fix Guardian – Next.js Compatibility Auto-Fix
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: The Lovable sync bot pushes directly to main using React Router DOM
# syntax which is incompatible with this Next.js project. This workflow
# automatically re-applies all Next.js compatibility fixes after every push,
# ensuring the Vercel build always succeeds.
#
# FIXES APPLIED:
#   - react-router-dom → next/link and next/navigation (all components)
#   - <Link to= → <Link href= (all components)
#   - useNavigate/navigate() → useRouter/router.push() (all components)
#   - router.push(x, {replace:true}) → router.replace(x)
#   - "use client" directives on all 70+ client-side components
#   - window.pathname → window.location.pathname
#   - SEO.tsx restored as no-op stub (react-helmet-async not installed)
#   - calendar.tsx restored for react-day-picker v9 (Chevron API)
#   - StaticImageData img src → .src property
#   - BlogsPage getSrc() for ImageSrc type
#   - AboutPage orville-matias-about.jpeg extension
#   - CMS editor null guards for postId/industryId/serviceId
#   - AnimatedSection mobile layout fixes
#   - globals.css overflow-x hidden
#   - blogPosts getSrc() helper
#   - GetAIAssessmentPage layout fixes
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fix-guardian
  cancel-in-progress: false

jobs:
  apply-nextjs-fixes:
    name: Apply Next.js Compatibility Fixes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Skip if this commit is already a fix commit
        id: check_skip
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $LAST_MSG"
          if echo "$LAST_MSG" | grep -qE "^fix\(guardian\)|^fix: re-apply|^fix: restore|^fix: correct"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "This is a fix commit — skipping to avoid infinite loop."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git identity
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git config user.name "Fix Guardian"
          git config user.email "fixes@centience.ai"

      - name: Set up Python
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore SEO.tsx stub
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/SEO.tsx
          echo "Restored SEO.tsx"

      - name: Restore calendar.tsx (react-day-picker v9)
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/ui/calendar.tsx
          echo "Restored calendar.tsx"

      - name: Restore AnimatedSection.tsx
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/AnimatedSection.tsx
          echo "Restored AnimatedSection.tsx"

      - name: Run comprehensive Next.js compatibility fix script
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          python3 - << 'FIXEOF'
          import os, re

          BASE = os.getcwd()

          def read(path):
              with open(path, "r", encoding="utf-8", errors="ignore") as f:
                  return f.read()

          def write(path, content):
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"  Fixed: {path.replace(BASE+'/', '')}")

          def ensure_use_client(path):
              content = read(path)
              if not content.startswith('"use client"'):
                  write(path, '"use client";\n' + content)

          def fix_react_router_dom(path):
              content = read(path)
              original = content
              content = re.sub(r'import\s*\{\s*Link\s*\}\s*from\s*["\'\']react-router-dom["\'\'];?', 'import Link from "next/link";', content)
              content = re.sub(r'import\s*\{\s*useNavigate\s*\}\s*from\s*["\'\']react-router-dom["\'\'];?', 'import { useRouter } from "next/navigation";', content)
              content = re.sub(r'import\s*\{\s*useNavigate,\s*useParams\s*\}\s*from\s*["\'\']react-router-dom["\'\'];?', 'import { useRouter, useParams } from "next/navigation";', content)
              content = re.sub(r'import\s*\{\s*useParams,\s*useNavigate\s*\}\s*from\s*["\'\']react-router-dom["\'\'];?', 'import { useRouter, useParams } from "next/navigation";', content)
              content = re.sub(r'import\s*\{\s*useParams\s*\}\s*from\s*["\'\']react-router-dom["\'\'];?', 'import { useParams } from "next/navigation";', content)
              content = re.sub(r'import\s*\{[^}]+\}\s*from\s*["\'\']react-router-dom["\'\'];?\n?', 'import { useRouter } from "next/navigation";\n', content)
              content = content.replace('const navigate = useNavigate();', 'const router = useRouter();')
              content = content.replace('const navigate = useNavigate()', 'const router = useRouter()')
              content = re.sub(r'\bnavigate\(', 'router.push(', content)
              content = re.sub(r'router\.push\(([^,)]+),\s*\{\s*replace:\s*true\s*\}\)', r'router.replace(\1)', content)
              content = re.sub(r'<Link\s+to=', '<Link href=', content)
              content = re.sub(r'<Link\n(\s+)to=', r'<Link\n\1href=', content)
              content = content.replace('}, [navigate]);', '}, [router]);')
              content = re.sub(r'\bwindow\.pathname\b', 'window.location.pathname', content)
              if content != original:
                  write(path, content)

          print("=== Applying Next.js fixes ===")

          # Fix react-router-dom in all components and page-components
          for d in [f"{BASE}/components", f"{BASE}/page-components"]:
              if not os.path.exists(d): continue
              for root, dirs, files in os.walk(d):
                  for fname in files:
                      if fname.endswith((".tsx", ".ts")):
                          fpath = os.path.join(root, fname)
                          content = read(fpath)
                          if "react-router-dom" in content or "useNavigate" in content:
                              fix_react_router_dom(fpath)

          # Add "use client" to all client-side components
          client_files = [
              "components/About.tsx", "components/BlogAuthorCard.tsx", "components/CTA.tsx",
              "components/CountUp.tsx", "components/FAQ.tsx", "components/FloatingCard.tsx",
              "components/GlowOrb.tsx", "components/GoogleAnalytics.tsx", "components/Header.tsx",
              "components/Hero.tsx", "components/Industries.tsx", "components/LocationsSection.tsx",
              "components/NativeContactForm.tsx", "components/ParticleBackground.tsx",
              "components/ScrollToTop.tsx", "components/Services.tsx",
              "components/admin/MFAVerification.tsx",
              "components/admin/cms/CMSBlogEditor.tsx", "components/admin/cms/CMSBlogList.tsx",
              "components/admin/cms/CMSIndustriesList.tsx", "components/admin/cms/CMSIndustryEditor.tsx",
              "components/admin/cms/CMSPageContentEditor.tsx", "components/admin/cms/CMSSEOEditor.tsx",
              "components/admin/cms/CMSServiceEditor.tsx", "components/admin/cms/CMSServicesList.tsx",
              "components/ui/carousel.tsx", "components/ui/chart.tsx", "components/ui/form.tsx",
              "components/ui/input-otp.tsx", "components/ui/sidebar.tsx", "components/ui/sonner.tsx",
              "components/ui/toaster.tsx", "components/ui/toggle-group.tsx",
              "page-components/AIComplianceAssessmentPage.tsx", "page-components/AICompliancePage.tsx",
              "page-components/AIGovernanceCompliancePage.tsx", "page-components/AIIntegrationPage.tsx",
              "page-components/AIReadinessAssessmentPage.tsx", "page-components/AboutPage.tsx",
              "page-components/AccountingPage.tsx", "page-components/BlogPostPage.tsx",
              "page-components/BlogsPage.tsx", "page-components/CloudSolutionsPage.tsx",
              "page-components/CoManagedITPage.tsx", "page-components/ComplianceCommunicationPage.tsx",
              "page-components/CybersecurityPage.tsx", "page-components/DisasterRecoveryChecklistPage.tsx",
              "page-components/DisasterRecoveryPage.tsx", "page-components/FinancialServicesPage.tsx",
              "page-components/FreeRiskAssessmentPage.tsx", "page-components/GRCPage.tsx",
              "page-components/GetAIAssessmentPage.tsx", "page-components/GetAIComplianceAssessmentPage.tsx",
              "page-components/GetCloudAssessmentPage.tsx", "page-components/GetDRAssessmentPage.tsx",
              "page-components/GetPartnershipOptionsPage.tsx", "page-components/GetStartedPage.tsx",
              "page-components/HIPAAComplianceChecklistPage.tsx", "page-components/HealthcarePage.tsx",
              "page-components/HelpDeskPage.tsx", "page-components/LegalPage.tsx",
              "page-components/MSSPCybersecurityPage.tsx", "page-components/ManagedITPage.tsx",
              "page-components/NonProfitPage.tsx", "page-components/ProfessionalServicesPage.tsx",
              "page-components/ReferralPage.tsx",
              "page-components/locations/BocaRatonNewPage.tsx", "page-components/locations/BocaRatonPage.tsx",
              "page-components/locations/FloridaPage.tsx", "page-components/locations/MiamiPage.tsx",
              "page-components/locations/NewYorkPage.tsx",
              "page-components/locations/WestPalmBeachNewPage.tsx", "page-components/locations/WestPalmBeachPage.tsx",
          ]
          for rel in client_files:
              fp = f"{BASE}/{rel}"
              if os.path.exists(fp): ensure_use_client(fp)

          # Fix window.pathname
          for root, dirs, files in os.walk(f"{BASE}/page-components"):
              for fname in files:
                  if fname.endswith(".tsx"):
                      fpath = os.path.join(root, fname)
                      content = read(fpath)
                      if "window.pathname" in content:
                          write(fpath, content.replace("window.pathname", "window.location.pathname"))

          # Fix navigate deps
          for root, dirs, files in os.walk(f"{BASE}/page-components"):
              for fname in files:
                  if fname.endswith(".tsx"):
                      fpath = os.path.join(root, fname)
                      content = read(fpath)
                      if "}, [navigate]);" in content:
                          write(fpath, content.replace("}, [navigate]);", "}, [router]);"))

          # Fix router.push replace option
          for d in [f"{BASE}/page-components", f"{BASE}/components"]:
              if not os.path.exists(d): continue
              for root, dirs, files in os.walk(d):
                  for fname in files:
                      if fname.endswith(".tsx"):
                          fpath = os.path.join(root, fname)
                          content = read(fpath)
                          new = re.sub(r'router\.push\(([^,)]+),\s*\{\s*replace:\s*true\s*\}\)', r'router.replace(\1)', content)
                          if new != content: write(fpath, new)

          # Fix StaticImageData
          for rel in ["components/BlogAuthorCard.tsx", "components/LocationsSection.tsx",
                      "page-components/AboutPage.tsx",
                      "page-components/locations/BocaRatonNewPage.tsx", "page-components/locations/BocaRatonPage.tsx",
                      "page-components/locations/FloridaPage.tsx", "page-components/locations/MiamiPage.tsx",
                      "page-components/locations/WestPalmBeachNewPage.tsx", "page-components/locations/WestPalmBeachPage.tsx"]:
              fp = f"{BASE}/{rel}"
              if not os.path.exists(fp): continue
              content = read(fp)
              original = content
              content = content.replace('src={authorPhoto}', 'src={typeof authorPhoto === "string" ? authorPhoto : (authorPhoto as any).src}')
              content = re.sub(r'<img\s+src={([a-zA-Z_][a-zA-Z0-9_]*)}', r'<img src={typeof \1 === "string" ? \1 : (\1 as any).src}', content)
              if content != original: write(fp, content)

          # Fix BlogsPage getSrc
          bp = f"{BASE}/page-components/BlogsPage.tsx"
          if os.path.exists(bp):
              content = read(bp)
              original = content
              if 'getSrc' not in content:
                  content = content.replace('import { blogPosts } from "@/data/blogPosts";', 'import { blogPosts, getSrc } from "@/data/blogPosts";')
              content = content.replace('src={blog.image}', 'src={getSrc(blog.image)}')
              if content != original: write(bp, content)

          # Fix AboutPage image extension
          ap = f"{BASE}/page-components/AboutPage.tsx"
          if os.path.exists(ap):
              content = read(ap)
              if "orville-matias-about.png" in content:
                  write(ap, content.replace('import orvillePhoto from "@/assets/orville-matias-about.png"', 'import orvillePhoto from "@/assets/orville-matias-about.jpeg"'))

          # Fix CMS editor null guards
          for rel, fn, id_var in [
              ("components/admin/cms/CMSBlogEditor.tsx", "fetchPost", "postId"),
              ("components/admin/cms/CMSIndustryEditor.tsx", "fetchIndustry", "industryId"),
              ("components/admin/cms/CMSServiceEditor.tsx", "fetchService", "serviceId"),
          ]:
              fp = f"{BASE}/{rel}"
              if not os.path.exists(fp): continue
              content = read(fp)
              original = content
              guard = f"if (!{id_var}) return;\n    "
              marker = f"const {fn} = async () => {{\n    setIsLoading(true);"
              if guard not in content and marker in content:
                  content = content.replace(marker, f"const {fn} = async () => {{\n    {guard}setIsLoading(true);")
                  if content != original: write(fp, content)

          # globals.css overflow-x hidden
          gp = f"{BASE}/app/globals.css"
          if os.path.exists(gp):
              content = read(gp)
              if "overflow-x: hidden" not in content:
                  content = content.replace("html,\nbody {", "html,\nbody {\n  overflow-x: hidden;")
                  write(gp, content)

          # blogPosts getSrc helper
          bpts = f"{BASE}/data/blogPosts.ts"
          if os.path.exists(bpts):
              content = read(bpts)
              if "export function getSrc" not in content and "export const getSrc" not in content:
                  insert = '\nexport function getSrc(image: any): string {\n  if (typeof image === "string") return image;\n  return image.src;\n}\n'
                  content += insert
                  write(bpts, content)

          # Fix fonts: Space Grotesk instead of Playfair Display
          import re as _re
          tc = f"{BASE}/tailwind.config.ts"
          if os.path.exists(tc):
              content = read(tc)
              original = content
              content = _re.sub(
                  r'display:\s*\["Playfair Display"[^\]]*\]',
                  'display: ["var(--font-space-grotesk)", "Space Grotesk", "Inter", "system-ui", "sans-serif"]',
                  content
              )
              if content != original: write(tc, content)
          lt = f"{BASE}/app/layout.tsx"
          if os.path.exists(lt):
              content = read(lt)
              original = content
              content = content.replace(
                  "import { Inter, Playfair_Display } from 'next/font/google';",
                  "import { Inter, Space_Grotesk } from 'next/font/google';"
              )
              content = content.replace(
                  'import { Inter, Playfair_Display } from "next/font/google";',
                  'import { Inter, Space_Grotesk } from "next/font/google";'
              )
              content = _re.sub(
                  r'const playfair = Playfair_Display\(\{[^}]+\}\);',
                  "const spaceGrotesk = Space_Grotesk({\n  subsets: ['latin'],\n  variable: '--font-space-grotesk',\n  display: 'swap',\n  weight: ['600', '700'],\n});",
                  content
              )
              content = _re.sub(
                  r'className=\{`\$\{inter\.variable\} \$\{playfair\.variable\}`\}',
                  'className={`${inter.variable} ${spaceGrotesk.variable}`}',
                  content
              )
              if content != original: write(lt, content)

          print("=== All fixes applied! ===")
          FIXEOF

      - name: Check for changes and commit
        if: steps.check_skip.outputs.skip != 'true'
        id: commit_fixes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "All Next.js fixes are already in place — no changes needed."
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            CHANGED_FILES=$(git diff --cached --name-only | wc -l)
            git commit -m "fix(guardian): auto-restore Next.js compatibility fixes [${CHANGED_FILES} files]"
            git push
            echo "Pushed Next.js compatibility fixes for ${CHANGED_FILES} files."
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Vercel Deploy Hook (when no file changes needed)
        if: steps.check_skip.outputs.skip != 'true' && steps.commit_fixes.outputs.changes == 'false'
        run: |
          # Vercel now skips bot commits (chore(sync):) via the Ignored Build Step setting.
          # When Fix Guardian has no file changes to push, Vercel won't deploy automatically.
          # We trigger the Deploy Hook to ensure the current HEAD (already correct) gets deployed.
          echo "No file changes needed — triggering Vercel Deploy Hook to deploy current HEAD..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_JOtoF40htnddIgFupyOkiF60DeSc/PyTjsrRsTf")
          echo "Deploy hook response: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "Deploy hook triggered successfully."
          else
            echo "Warning: Deploy hook returned HTTP $HTTP_STATUS"
          fi

      - name: Fix SEO health check URLs
        run: |
          FILE=".github/workflows/seo-auto-push.yml"
          CHANGED=false
          if grep -q '"/services/managed-it"' "$FILE" 2>/dev/null; then
            sed -i 's|"/services/managed-it"|"/services/managed-it-services"|g' "$FILE"
            CHANGED=true
          fi
          if grep -q '"/blog"' "$FILE" 2>/dev/null; then
            sed -i 's|"/blog"|"/blogs"|g' "$FILE"
            CHANGED=true
          fi
          if [ "$CHANGED" = "true" ]; then
            git add .github/workflows/seo-auto-push.yml
            git diff --cached --quiet || git commit -m "fix(guardian): correct SEO health check URLs" && git push
          fi
