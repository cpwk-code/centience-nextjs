name: Fix Guardian – Next.js Compatibility Auto-Fix
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: The Lovable sync bot pushes directly to main using React Router DOM
# syntax which is incompatible with this Next.js project. This workflow
# automatically re-applies all Next.js compatibility fixes after every push,
# ensuring the Vercel build always succeeds.
#
# FIXES APPLIED:
#   - react-router-dom → next/link and next/navigation (all components)
#   - <Link to= → <Link href= (all components)
#   - useNavigate/navigate() → useRouter/router.push() (all components)
#   - router.push(x, {replace:true}) → router.replace(x)
#   - "use client" directives on all client-side components
#   - window.pathname → window.location.pathname
#   - SEO.tsx restored as no-op stub (react-helmet-async not installed)
#   - AnimatedSection mobile layout fixes
#   - globals.css overflow-x hidden
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fix-guardian
  cancel-in-progress: false

jobs:
  apply-nextjs-fixes:
    name: Apply Next.js Compatibility Fixes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Skip if this commit is already a fix commit
        id: check_skip
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $LAST_MSG"
          if echo "$LAST_MSG" | grep -qE "^fix\(guardian\)|^fix: re-apply|^fix: restore|^fix: correct"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "This is a fix commit — skipping to avoid infinite loop."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git identity
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          git config user.name "Fix Guardian"
          git config user.email "fixes@centience.ai"

      - name: Set up Python
        if: steps.check_skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore SEO.tsx stub
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/SEO.tsx
          echo "Restored SEO.tsx"

      - name: Restore Header.tsx (Navbar)
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/Header.tsx
          echo "Restored Header.tsx"

      - name: Restore Navbar.tsx
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/Navbar.tsx
          echo "Restored Navbar.tsx"

      - name: Restore ScrollToTop.tsx
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/ScrollToTop.tsx
          echo "Restored ScrollToTop.tsx"

      - name: Restore AnimatedSection.tsx
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          echo "" | base64 -d > components/AnimatedSection.tsx
          echo "Restored AnimatedSection.tsx"

      - name: Run comprehensive Next.js compatibility fix script
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          python3 - << 'FIXEOF'
          import os, re

          BASE = os.getcwd()

          def read(path):
              with open(path, "r", encoding="utf-8", errors="ignore") as f:
                  return f.read()

          def write(path, content):
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"  Fixed: {path.replace(BASE+'/', '')}")

          def ensure_use_client(path):
              content = read(path)
              if not content.startswith('"use client"') and not content.startswith("'use client'"):
                  write(path, '"use client";\n' + content)

          def fix_react_router_dom(path):
              content = read(path)
              original = content
              content = re.sub(r'import\s*\{\s*Link\s*\}\s*from\s*["\']react-router-dom["\'];?', 'import Link from "next/link";', content)
              content = re.sub(r'import\s*\{\s*useNavigate\s*\}\s*from\s*["\']react-router-dom["\'];?', 'import { useRouter } from "next/navigation";', content)
              content = re.sub(r'import\s*\{\s*useNavigate,\s*useParams\s*\}\s*from\s*["\']react-router-dom["\'];?', 'import { useRouter, useParams } from "next/navigation";', content)
              content = re.sub(r'import\s*\{\s*useParams,\s*useNavigate\s*\}\s*from\s*["\']react-router-dom["\'];?', 'import { useRouter, useParams } from "next/navigation";', content)
              content = re.sub(r'import\s*\{[^}]+\}\s*from\s*["\']react-router-dom["\'];?\n?', 'import { useRouter } from "next/navigation";\n', content)
              content = content.replace('const navigate = useNavigate();', 'const router = useRouter();')
              content = content.replace('const navigate = useNavigate()', 'const router = useRouter()')
              content = re.sub(r'\bnavigate\(', 'router.push(', content)
              content = re.sub(r'router\.push\(([^,)]+),\s*\{\s*replace:\s*true\s*\}\)', r'router.replace(\1)', content)
              content = re.sub(r'<Link\s+to=', '<Link href=', content)
              content = re.sub(r'<Link\n(\s+)to=', r'<Link\n\1href=', content)
              content = content.replace('}, [navigate]);', '}, [router]);')
              content = re.sub(r'\bwindow\.pathname\b', 'window.location.pathname', content)
              if content != original:
                  write(path, content)

          print("=== Applying Next.js fixes ===")

          # Fix react-router-dom in all components and page-components
          for d in [f"{BASE}/components", f"{BASE}/page-components"]:
              if not os.path.exists(d): continue
              for root, dirs, files in os.walk(d):
                  for fname in files:
                      if fname.endswith((".tsx", ".ts")):
                          fpath = os.path.join(root, fname)
                          content = read(fpath)
                          if "react-router-dom" in content or "useNavigate" in content:
                              fix_react_router_dom(fpath)

          # Add "use client" to all client-side page-components and shared components
          client_files = [
              # Shared components
              "components/Footer.tsx", "components/Navbar.tsx", "components/ScrollToTop.tsx",
              "components/GoogleAnalytics.tsx", "components/AnimatedSection.tsx",
              "components/SEO.tsx", "components/ContactForm.tsx",
              "components/ui/carousel.tsx", "components/ui/chart.tsx", "components/ui/form.tsx",
              "components/ui/input-otp.tsx", "components/ui/sidebar.tsx", "components/ui/sonner.tsx",
              "components/ui/toaster.tsx", "components/ui/toggle-group.tsx",
              # Page components - all are client-side (framer-motion, hooks, etc.)
              "page-components/AIComplianceAssessmentPage.tsx",
              "page-components/AIComplianceGovernancePage.tsx",
              "page-components/AICompliancePage.tsx",
              "page-components/AIGovernanceAssessment.tsx",
              "page-components/AIGovernanceCompliancePage.tsx",
              "page-components/AIGovernancePage.tsx",
              "page-components/AIIntegrationPage.tsx",
              "page-components/AIReadinessAssessmentPage.tsx",
              "page-components/AboutPage.tsx",
              "page-components/AccountingPage.tsx",
              "page-components/BlogPostPage.tsx",
              "page-components/BlogsPage.tsx",
              "page-components/CloudSolutionsPage.tsx",
              "page-components/CoManagedITPage.tsx",
              "page-components/CoManagementPage.tsx",
              "page-components/ComplianceCommunicationPage.tsx",
              "page-components/ContactPage.tsx",
              "page-components/CybersecurityPage.tsx",
              "page-components/DisasterRecoveryChecklistPage.tsx",
              "page-components/DisasterRecoveryPage.tsx",
              "page-components/FinancialServicesPage.tsx",
              "page-components/FreeRiskAssessmentPage.tsx",
              "page-components/GRCPage.tsx",
              "page-components/GetAIAssessmentPage.tsx",
              "page-components/GetAIComplianceAssessmentPage.tsx",
              "page-components/GetCloudAssessmentPage.tsx",
              "page-components/GetDRAssessmentPage.tsx",
              "page-components/GetPartnershipOptionsPage.tsx",
              "page-components/GetStartedPage.tsx",
              "page-components/GonePage.tsx",
              "page-components/GovernanceMSPPage.tsx",
              "page-components/GovernancePage.tsx",
              "page-components/HIPAAComplianceChecklistPage.tsx",
              "page-components/HealthcarePage.tsx",
              "page-components/HelpDeskPage.tsx",
              "page-components/Index.tsx",
              "page-components/IndustriesPage.tsx",
              "page-components/IndustryPage.tsx",
              "page-components/InfrastructurePage.tsx",
              "page-components/InsightsPage.tsx",
              "page-components/LegalPage.tsx",
              "page-components/MSSPCybersecurityPage.tsx",
              "page-components/ManagedITPage.tsx",
              "page-components/NonProfitPage.tsx",
              "page-components/NotFound.tsx",
              "page-components/OperationalResiliencePage.tsx",
              "page-components/PartnerProgram.tsx",
              "page-components/PrivacyPolicyPage.tsx",
              "page-components/ProfessionalServicesPage.tsx",
              "page-components/RebrandPage.tsx",
              "page-components/ReferralPage.tsx",
              "page-components/ScheduleAssessmentPage.tsx",
              "page-components/ServicePage.tsx",
              "page-components/TermsOfServicePage.tsx",
              # Admin
              "page-components/admin/AdminDashboard.tsx",
              "page-components/admin/AdminLoginPage.tsx",
              "page-components/admin/CMSPage.tsx",
              "page-components/admin/MFASetupPage.tsx",
              # Assessments
              "page-components/assessments/AccountingCpaAssessment.tsx",
              "page-components/assessments/FinancialServicesAssessment.tsx",
              "page-components/assessments/HealthcareAssessment.tsx",
              "page-components/assessments/LawFirmsAssessment.tsx",
              "page-components/assessments/NonProfitAssessment.tsx",
              "page-components/assessments/PrivateEquityAssessment.tsx",
              # Industries
              "page-components/industries/AccountingCpaPage.tsx",
              "page-components/industries/FinancialServicesPage.tsx",
              "page-components/industries/HealthcarePage.tsx",
              "page-components/industries/LawFirmsPage.tsx",
              "page-components/industries/NonProfitPage.tsx",
              "page-components/industries/PrivateEquityPage.tsx",
              # Locations
              "page-components/locations/BocaRatonNewPage.tsx",
              "page-components/locations/BocaRatonPage.tsx",
              "page-components/locations/FloridaPage.tsx",
              "page-components/locations/MiamiPage.tsx",
              "page-components/locations/NewYorkPage.tsx",
              "page-components/locations/WestPalmBeachNewPage.tsx",
              "page-components/locations/WestPalmBeachPage.tsx",
              # Resources
              "page-components/resources/AssessmentsPage.tsx",
              "page-components/resources/GuidesPage.tsx",
              "page-components/resources/NewsletterPage.tsx",
          ]
          for rel in client_files:
              fp = f"{BASE}/{rel}"
              if os.path.exists(fp): ensure_use_client(fp)

          # Fix window.pathname in all page-components
          for root, dirs, files in os.walk(f"{BASE}/page-components"):
              for fname in files:
                  if fname.endswith(".tsx"):
                      fpath = os.path.join(root, fname)
                      content = read(fpath)
                      if "window.pathname" in content:
                          write(fpath, content.replace("window.pathname", "window.location.pathname"))

          # Fix navigate deps
          for root, dirs, files in os.walk(f"{BASE}/page-components"):
              for fname in files:
                  if fname.endswith(".tsx"):
                      fpath = os.path.join(root, fname)
                      content = read(fpath)
                      if "}, [navigate]);" in content:
                          write(fpath, content.replace("}, [navigate]);", "}, [router]);"))

          # Fix router.push replace option
          for d in [f"{BASE}/page-components", f"{BASE}/components"]:
              if not os.path.exists(d): continue
              for root, dirs, files in os.walk(d):
                  for fname in files:
                      if fname.endswith(".tsx"):
                          fpath = os.path.join(root, fname)
                          content = read(fpath)
                          new = re.sub(r'router\.push\(([^,)]+),\s*\{\s*replace:\s*true\s*\}\)', r'router.replace(\1)', content)
                          if new != content: write(fpath, new)

          # globals.css overflow-x hidden
          gp = f"{BASE}/app/globals.css"
          if os.path.exists(gp):
              content = read(gp)
              if "overflow-x: hidden" not in content:
                  content = content.replace("html,\nbody {", "html,\nbody {\n  overflow-x: hidden;")
                  write(gp, content)

          print("=== All fixes applied! ===")
          FIXEOF

      - name: Check for changes and commit
        if: steps.check_skip.outputs.skip != 'true'
        id: commit_fixes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "All Next.js fixes are already in place — no changes needed."
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            CHANGED_FILES=$(git diff --cached --name-only | wc -l)
            git commit -m "fix(guardian): auto-restore Next.js compatibility fixes [${CHANGED_FILES} files]"
            git push
            echo "Pushed Next.js compatibility fixes for ${CHANGED_FILES} files."
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
