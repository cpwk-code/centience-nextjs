<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0b1520"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#f5d070"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Diagonal rule lines -->
  <g stroke="#e8b84b" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="630" x2="630" y2="0"/>
    <line x1="200" y1="630" x2="830" y2="0"/>
    <line x1="400" y1="630" x2="1030" y2="0"/>
    <line x1="600" y1="630" x2="1200" y2="30"/>
    <line x1="800" y1="630" x2="1200" y2="230"/>
  </g>

  <!-- FINRA watermark -->
  <text x="600" y="380" font-family="system-ui, sans-serif" font-size="200" font-weight="900"
        fill="#e8b84b" fill-opacity="0.04" text-anchor="middle">FINRA</text>

  <!-- Radial chart / examination graphic (right) -->
  <g transform="translate(920, 300)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#e8b84b" stroke-opacity="0.06" stroke-width="1"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#e8b84b" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#e8b84b" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="#e8b84b" fill-opacity="0.08" stroke="#e8b84b" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Spokes -->
    <g stroke="#e8b84b" stroke-opacity="0.2" stroke-width="1.2">
      <line x1="0" y1="-160" x2="0" y2="-40"/>
      <line x1="160" y1="0" x2="40" y2="0"/>
      <line x1="0" y1="160" x2="0" y2="40"/>
      <line x1="-160" y1="0" x2="-40" y2="0"/>
      <line x1="113" y1="-113" x2="28" y2="-28"/>
      <line x1="113" y1="113" x2="28" y2="28"/>
      <line x1="-113" y1="113" x2="-28" y2="28"/>
      <line x1="-113" y1="-113" x2="-28" y2="-28"/>
    </g>
    <!-- Active nodes on spokes -->
    <circle cx="0" cy="-120" r="5" fill="#e8b84b" fill-opacity="0.7"/>
    <circle cx="80" cy="0" r="5" fill="#e8b84b" fill-opacity="0.7"/>
    <circle cx="-80" cy="80" r="4" fill="#e8b84b" fill-opacity="0.5"/>
    <circle cx="84" cy="-84" r="4" fill="#e8b84b" fill-opacity="0.5"/>
    <!-- Center label -->
    <text x="0" y="6" font-family="system-ui, sans-serif" font-size="13" font-weight="700"
          fill="#e8b84b" text-anchor="middle" letter-spacing="1">EXAM</text>
  </g>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="url(#gold)"/>

  <!-- Category tag -->
  <rect x="60" y="60" width="160" height="32" rx="16" fill="#e8b84b" fill-opacity="0.12" stroke="#e8b84b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="140" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e8b84b" text-anchor="middle" letter-spacing="1.5">AI GOVERNANCE</text>

  <text x="60" y="490" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#f7f4ef">FINRA 2026 AROR:</text>
  <text x="60" y="538" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#e8b84b">AI Governance for Broker-Dealers</text>

  <text x="1140" y="590" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8b84b" fill-opacity="0.5" text-anchor="end" letter-spacing="2">CENTIENCE</text>
</svg>
