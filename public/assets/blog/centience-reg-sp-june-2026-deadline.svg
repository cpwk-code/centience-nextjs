<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1929"/>
      <stop offset="100%" style="stop-color:#1a1030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#f5d070"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8574b"/>
      <stop offset="100%" style="stop-color:#ff7a6b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#e8b84b" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Countdown clock (right side) -->
  <g transform="translate(900, 290)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#e8574b" stroke-opacity="0.08" stroke-width="2"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#e8574b" stroke-opacity="0.12" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="120" fill="#1a0f12" stroke="#e8574b" stroke-opacity="0.3" stroke-width="2"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-85" stroke="#e8574b" stroke-width="3" stroke-linecap="round" stroke-opacity="0.8"/>
    <line x1="0" y1="0" x2="60" y2="40" stroke="#e8b84b" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#e8574b"/>
    <!-- Tick marks -->
    <g stroke="#e8574b" stroke-opacity="0.3" stroke-width="1">
      <line x1="0" y1="-110" x2="0" y2="-120"/>
      <line x1="55" y1="-95" x2="60" y2="-104"/>
      <line x1="95" y1="-55" x2="104" y2="-60"/>
      <line x1="110" y1="0" x2="120" y2="0"/>
      <line x1="95" y1="55" x2="104" y2="60"/>
      <line x1="55" y1="95" x2="60" y2="104"/>
      <line x1="0" y1="110" x2="0" y2="120"/>
      <line x1="-55" y1="95" x2="-60" y2="104"/>
      <line x1="-95" y1="55" x2="-104" y2="60"/>
      <line x1="-110" y1="0" x2="-120" y2="0"/>
      <line x1="-95" y1="-55" x2="-104" y2="-60"/>
      <line x1="-55" y1="-95" x2="-60" y2="-104"/>
    </g>
    <!-- Deadline text inside clock -->
    <text x="0" y="-20" font-family="system-ui, sans-serif" font-size="13" fill="#e8574b" fill-opacity="0.8" text-anchor="middle" font-weight="600">DEADLINE</text>
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="28" fill="#e8b84b" text-anchor="middle" font-weight="900">JUNE 3</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="16" fill="#e8b84b" fill-opacity="0.7" text-anchor="middle" font-weight="600">2026</text>
  </g>

  <!-- Four requirement boxes (left-center) -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="460" height="52" rx="6" fill="#e8574b" fill-opacity="0.08" stroke="#e8574b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="52" fill="#e8574b" fill-opacity="0.8"/>
    <text x="20" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7f4ef">Incident Response Program</text>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#f7f4ef" fill-opacity="0.5">Written policies to detect, respond to, and recover from breaches</text>

    <rect x="0" y="68" width="460" height="52" rx="6" fill="#e8574b" fill-opacity="0.08" stroke="#e8574b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="68" width="3" height="52" fill="#e8574b" fill-opacity="0.8"/>
    <text x="20" y="90" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7f4ef">30-Day Customer Notification</text>
    <text x="20" y="108" font-family="system-ui, sans-serif" font-size="11" fill="#f7f4ef" fill-opacity="0.5">Notify affected clients within 30 days of discovering a breach</text>

    <rect x="0" y="136" width="460" height="52" rx="6" fill="#e8574b" fill-opacity="0.08" stroke="#e8574b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="136" width="3" height="52" fill="#e8574b" fill-opacity="0.8"/>
    <text x="20" y="158" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7f4ef">Vendor 72-Hour Notification</text>
    <text x="20" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#f7f4ef" fill-opacity="0.5">Service providers must notify the RIA within 72 hours of a breach</text>

    <rect x="0" y="204" width="460" height="52" rx="6" fill="#e8574b" fill-opacity="0.08" stroke="#e8574b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="204" width="3" height="52" fill="#e8574b" fill-opacity="0.8"/>
    <text x="20" y="226" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f7f4ef">Expanded Customer Information Scope</text>
    <text x="20" y="244" font-family="system-ui, sans-serif" font-size="11" fill="#f7f4ef" fill-opacity="0.5">Covers data from third-party sources, not just direct client records</text>
  </g>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="url(#gold)"/>

  <!-- Category tag — red for deadline urgency -->
  <rect x="60" y="60" width="165" height="32" rx="16" fill="#e8574b" fill-opacity="0.15" stroke="#e8574b" stroke-opacity="0.5" stroke-width="1"/>
  <text x="142" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e8574b" text-anchor="middle" letter-spacing="1.5">SEC DEADLINE</text>

  <text x="60" y="510" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#f7f4ef">Reg S-P June 3, 2026 Deadline:</text>
  <text x="60" y="556" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#e8b84b">What Smaller RIAs Must Do Now</text>

  <text x="1140" y="600" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8b84b" fill-opacity="0.5" text-anchor="end" letter-spacing="2">CENTIENCE</text>
</svg>
