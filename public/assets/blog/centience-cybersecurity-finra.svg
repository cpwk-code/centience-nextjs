<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1828"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#f5d070"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Network topology graphic (right side) -->
  <g transform="translate(820, 310)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="36" fill="#e8b84b" fill-opacity="0.12" stroke="#e8b84b" stroke-opacity="0.5" stroke-width="2"/>
    <text x="0" y="5" font-family="system-ui, sans-serif" font-size="11" font-weight="700"
          fill="#e8b84b" text-anchor="middle">FIRM</text>

    <!-- Satellite nodes + connections -->
    <!-- Node 1: MFA -->
    <line x1="0" y1="-36" x2="0" y2="-110" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="0" cy="-135" r="25" fill="#162030" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="0" y="-129" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8b84b" text-anchor="middle">MFA</text>

    <!-- Node 2: Vendors -->
    <line x1="36" y1="0" x2="120" y2="-60" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="148" cy="-75" r="25" fill="#162030" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="148" y="-69" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8b84b" text-anchor="middle">VENDOR</text>

    <!-- Node 3: Logs -->
    <line x1="36" y1="0" x2="120" y2="60" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="148" cy="75" r="25" fill="#162030" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="148" y="81" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8b84b" text-anchor="middle">LOGS</text>

    <!-- Node 4: IR -->
    <line x1="0" y1="36" x2="0" y2="110" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="0" cy="135" r="25" fill="#162030" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="0" y="141" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8b84b" text-anchor="middle">IR PLAN</text>

    <!-- Node 5: Access -->
    <line x1="-36" y1="0" x2="-120" y2="60" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="-148" cy="75" r="25" fill="#162030" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="-148" y="81" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8b84b" text-anchor="middle">ACCESS</text>

    <!-- Node 6: Inventory -->
    <line x1="-36" y1="0" x2="-120" y2="-60" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="-148" cy="-75" r="25" fill="#162030" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="-148" y="-69" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8b84b" text-anchor="middle">ASSET</text>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#e8b84b" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="url(#gold)"/>

  <!-- Category tag -->
  <rect x="60" y="60" width="165" height="32" rx="16" fill="#e8b84b" fill-opacity="0.12" stroke="#e8b84b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="142" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e8b84b" text-anchor="middle" letter-spacing="1.5">CYBERSECURITY</text>

  <text x="60" y="490" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#f7f4ef">Cybersecurity Governance</text>
  <text x="60" y="538" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#e8b84b">for FINRA Member Firms</text>

  <text x="1140" y="590" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8b84b" fill-opacity="0.5" text-anchor="end" letter-spacing="2">CENTIENCE</text>
</svg>
