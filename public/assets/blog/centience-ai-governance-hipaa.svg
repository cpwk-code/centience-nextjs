<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1929"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#f5d070"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b84b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e8b84b;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#e8b84b" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Central shield -->
  <path d="M600 80 L730 140 L730 290 Q730 380 600 430 Q470 380 470 290 L470 140 Z"
        fill="url(#shield-fill)" stroke="#e8b84b" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Shield inner cross (HIPAA medical cross) -->
  <rect x="576" y="200" width="48" height="140" rx="6" fill="#e8b84b" fill-opacity="0.8"/>
  <rect x="530" y="246" width="140" height="48" rx="6" fill="#e8b84b" fill-opacity="0.8"/>

  <!-- AI circuit nodes around shield -->
  <g fill="none" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.2">
    <circle cx="320" cy="200" r="6" fill="#e8b84b" fill-opacity="0.6" stroke="none"/>
    <circle cx="880" cy="200" r="6" fill="#e8b84b" fill-opacity="0.6" stroke="none"/>
    <circle cx="280" cy="350" r="4" fill="#e8b84b" fill-opacity="0.4" stroke="none"/>
    <circle cx="920" cy="350" r="4" fill="#e8b84b" fill-opacity="0.4" stroke="none"/>
    <line x1="320" y1="200" x2="470" y2="240"/>
    <line x1="880" y1="200" x2="730" y2="240"/>
    <line x1="280" y1="350" x2="470" y2="320"/>
    <line x1="920" y1="350" x2="730" y2="320"/>
    <line x1="320" y1="200" x2="280" y2="350"/>
    <line x1="880" y1="200" x2="920" y2="350"/>
  </g>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="url(#gold)"/>

  <!-- Category tag -->
  <rect x="60" y="60" width="160" height="32" rx="16" fill="#e8b84b" fill-opacity="0.12" stroke="#e8b84b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="140" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e8b84b" text-anchor="middle" letter-spacing="1.5">AI GOVERNANCE</text>

  <!-- Title text -->
  <text x="60" y="510" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#f7f4ef" letter-spacing="-0.5">AI Governance Under</text>
  <text x="60" y="558" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#e8b84b">HIPAA</text>

  <!-- Centience wordmark -->
  <text x="1140" y="590" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8b84b" fill-opacity="0.5" text-anchor="end" letter-spacing="2">CENTIENCE</text>
</svg>
