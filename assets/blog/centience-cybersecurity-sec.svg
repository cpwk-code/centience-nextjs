<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1929"/>
      <stop offset="100%" style="stop-color:#1a2030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#f5d070"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Horizontal rule lines -->
  <g stroke="#e8b84b" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>

  <!-- Timeline / compliance bar chart (right side) -->
  <g transform="translate(650, 120)">
    <!-- Year labels -->
    <text x="40" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#e8b84b" fill-opacity="0.5">2023</text>
    <text x="40" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#e8b84b" fill-opacity="0.5">2024</text>
    <text x="40" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#e8b84b" fill-opacity="0.5">2025</text>
    <text x="40" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#e8b84b" fill-opacity="0.5">2026</text>

    <!-- Bars -->
    <rect x="80" y="4" width="360" height="32" rx="4" fill="#e8b84b" fill-opacity="0.15" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1"/>
    <text x="96" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.7">SEC Cybersecurity Disclosure Rules</text>

    <rect x="80" y="94" width="280" height="32" rx="4" fill="#e8b84b" fill-opacity="0.15" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1"/>
    <text x="96" y="115" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.7">Reg S-P Amendments</text>

    <rect x="80" y="184" width="320" height="32" rx="4" fill="#e8b84b" fill-opacity="0.15" stroke="#e8b84b" stroke-opacity="0.25" stroke-width="1"/>
    <text x="96" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.7">$8.2B SEC Enforcement Record</text>

    <rect x="80" y="274" width="400" height="32" rx="4" fill="#e8b84b" fill-opacity="0.25" stroke="#e8b84b" stroke-opacity="0.5" stroke-width="1"/>
    <text x="96" y="295" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e8b84b">AI + Cybersecurity Exam Priority</text>

    <!-- Vertical timeline line -->
    <line x1="72" y1="4" x2="72" y2="310" stroke="#e8b84b" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="72" cy="20" r="4" fill="#e8b84b" fill-opacity="0.5"/>
    <circle cx="72" cy="110" r="4" fill="#e8b84b" fill-opacity="0.5"/>
    <circle cx="72" cy="200" r="4" fill="#e8b84b" fill-opacity="0.5"/>
    <circle cx="72" cy="290" r="6" fill="#e8b84b"/>
  </g>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="url(#gold)"/>

  <!-- Category tag -->
  <rect x="60" y="60" width="165" height="32" rx="16" fill="#e8b84b" fill-opacity="0.12" stroke="#e8b84b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="142" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e8b84b" text-anchor="middle" letter-spacing="1.5">CYBERSECURITY</text>

  <text x="60" y="490" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#f7f4ef">Cybersecurity Governance</text>
  <text x="60" y="538" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#e8b84b">for SEC-Regulated Firms</text>

  <text x="1140" y="590" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8b84b" fill-opacity="0.5" text-anchor="end" letter-spacing="2">CENTIENCE</text>
</svg>
