<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100a0a"/>
      <stop offset="100%" style="stop-color:#1a1530"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#f5d070"/>
    </linearGradient>
    <linearGradient id="red-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#e85a4b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Warning diagonal stripes (subtle) -->
  <g opacity="0.03">
    <rect x="600" y="0" width="60" height="630" fill="#e8b84b" transform="skewX(-20)"/>
    <rect x="740" y="0" width="60" height="630" fill="#e8b84b" transform="skewX(-20)"/>
    <rect x="880" y="0" width="60" height="630" fill="#e8b84b" transform="skewX(-20)"/>
    <rect x="1020" y="0" width="60" height="630" fill="#e8b84b" transform="skewX(-20)"/>
  </g>

  <!-- Enforcement case cards stacked (right side) -->
  <g transform="translate(650, 80)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="480" height="90" rx="8" fill="#1a0f0f" stroke="#e85a4b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="90" rx="2" fill="#e85a4b" fill-opacity="0.8"/>
    <text x="24" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f7f4ef">Delphia (USA) Inc.</text>
    <text x="24" y="52" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.5">March 2024 · Section 206 + Marketing Rule</text>
    <text x="400" y="52" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#e8b84b" text-anchor="end">$225K</text>

    <!-- Card 2 -->
    <rect x="0" y="110" width="480" height="90" rx="8" fill="#1a0f0f" stroke="#e85a4b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="110" width="4" height="90" rx="2" fill="#e85a4b" fill-opacity="0.8"/>
    <text x="24" y="140" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f7f4ef">Global Predictions, Inc.</text>
    <text x="24" y="162" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.5">March 2024 · Section 206 + Marketing Rule</text>
    <text x="400" y="162" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#e8b84b" text-anchor="end">$175K</text>

    <!-- Card 3 -->
    <rect x="0" y="220" width="480" height="90" rx="8" fill="#1a0f0f" stroke="#e85a4b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="220" width="4" height="90" rx="2" fill="#e85a4b" fill-opacity="0.8"/>
    <text x="24" y="250" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f7f4ef">Rockwell Capital Management</text>
    <text x="24" y="272" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.5">February 2024 · Fraud + Disgorgement</text>
    <text x="400" y="272" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#e8b84b" text-anchor="end">$1.8M+</text>

    <!-- Card 4 -->
    <rect x="0" y="330" width="480" height="90" rx="8" fill="#1a0f0f" stroke="#e85a4b" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="0" y="330" width="4" height="90" rx="2" fill="#e85a4b" fill-opacity="0.8"/>
    <text x="24" y="360" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f7f4ef">Nate Inc. / Nathan Saniger</text>
    <text x="24" y="382" font-family="system-ui, sans-serif" font-size="12" fill="#f7f4ef" fill-opacity="0.5">April 2025 · $42M raised on fabricated AI claims</text>
    <text x="400" y="382" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#e85a4b" text-anchor="end">Criminal</text>
  </g>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="url(#gold)"/>

  <!-- Category tag — red for enforcement -->
  <rect x="60" y="60" width="195" height="32" rx="16" fill="#e85a4b" fill-opacity="0.12" stroke="#e85a4b" stroke-opacity="0.5" stroke-width="1"/>
  <text x="157" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e85a4b" text-anchor="middle" letter-spacing="1.5">SEC ENFORCEMENT</text>

  <text x="60" y="460" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#f7f4ef">SEC AI Washing</text>
  <text x="60" y="508" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#e8b84b">Every Action. Every Penalty.</text>
  <text x="60" y="556" font-family="system-ui, sans-serif" font-size="18" fill="#f7f4ef" fill-opacity="0.5">What Investment Firms Must Do Now</text>

  <text x="1140" y="590" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e8b84b" fill-opacity="0.5" text-anchor="end" letter-spacing="2">CENTIENCE</text>
</svg>
